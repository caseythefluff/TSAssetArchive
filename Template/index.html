<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TS Assets | Dashboard</title>
    <style>
        :root {
            --bg-main: #0b0e14;
            --sidebar-bg: #11151c;
            --panel-bg: #1a1f29;
            --accent-pink: #ff91ab;
            --accent-teal: #8ceefc;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; }
        .logo-img { width: 100%; border-radius: 8px; margin-bottom: 25px; border: 1px solid var(--border); }
        
        .nav-label { font-size: 10px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1.5px; margin-bottom: 12px; }
        .nav-item { padding: 12px; border-radius: 8px; color: var(--text-main); cursor: pointer; font-size: 14px; margin-bottom: 4px; transition: 0.2s; }
        .nav-item:hover { background: var(--panel-bg); color: var(--accent-teal); }
        .nav-item.active { background: var(--accent-teal); color: #000; font-weight: bold; }

        .main { flex: 1; display: flex; flex-direction: column; }
        .topbar { height: 70px; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .search-input { background: var(--panel-bg); border: 1px solid var(--border); padding: 10px 15px; border-radius: 8px; color: white; width: 300px; }

        .content { flex: 1; overflow-y: auto; padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        
        /* DEV PORTAL UI */
        .dev-card { background: var(--panel-bg); border: 1px solid var(--border); padding: 25px; border-radius: 15px; max-width: 600px; margin: 0 auto; }
        .upload-row { background: var(--sidebar-bg); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .dev-btn { background: var(--accent-teal); color: #000; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .dev-btn.pink { background: var(--accent-pink); }
        .status-msg { font-size: 12px; margin-top: 10px; color: var(--accent-teal); }

        .card { background: var(--sidebar-bg); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .card-media { width: 100%; height: 160px; object-fit: cover; }
        .card-body { padding: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="https://raw.githubusercontent.com/caseythefluff/TSAssetArchive/main/Template/static/WebLogo.png" id="site-logo" class="logo-img">
        <div class="nav-label">Main Menu</div>
        <div class="nav-item active" id="btn-hub" onclick="showTab('hub')">Archive Hub</div>
        <div class="nav-item" id="btn-dev" onclick="showTab('dev')">Dev Portal</div>
    </div>

    <div class="main">
        <div class="topbar">
            <input type="text" class="search-input" placeholder="Search archive..." id="search">
            <div id="dots" style="display:flex; gap:5px;"></div>
        </div>

        <div class="content">
            <div id="tab-hub">
                <div class="grid" id="asset-grid"></div>
            </div>

            <div id="tab-dev" style="display:none;">
                <div class="dev-card">
                    <h2 style="margin-bottom:20px; color: var(--accent-pink);">Developer Controls</h2>
                    
                    <div class="upload-row">
                        <div>
                            <div style="font-weight:bold;">Update Website Logo</div>
                            <div style="font-size:11px; color:var(--text-dim);">Replaces WebLogo.png on GitHub</div>
                        </div>
                        <input type="file" id="input-logo" style="display:none" onchange="handleFile('logo')">
                        <button class="dev-btn" onclick="document.getElementById('input-logo').click()">SELECT IMAGE</button>
                    </div>

                    <div class="upload-row">
                        <div>
                            <div style="font-weight:bold;">Manual Asset Upload</div>
                            <div style="font-size:11px; color:var(--text-dim);">Add image/video to archive</div>
                        </div>
                        <input type="file" id="input-asset" style="display:none" onchange="handleFile('asset')">
                        <button class="dev-btn pink" onclick="document.getElementById('input-asset').click()">UPLOAD FILE</button>
                    </div>

                    <div id="dev-status" class="status-msg"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Tab Switching
        function showTab(tab) {
            document.getElementById('tab-hub').style.display = tab === 'hub' ? 'block' : 'none';
            document.getElementById('tab-dev').style.display = tab === 'dev' ? 'block' : 'none';
            document.getElementById('btn-hub').classList.toggle('active', tab === 'hub');
            document.getElementById('btn-dev').classList.toggle('active', tab === 'dev');
        }

        // Send data to Wix Velo Backend
        async function handleFile(type) {
            const input = document.getElementById(type === 'logo' ? 'input-logo' : 'input-asset');
            const status = document.getElementById('dev-status');
            const file = input.files[0];
            if (!file) return;

            status.innerText = `Processing ${type}...`;

            const reader = new FileReader();
            reader.onload = async function() {
                const base64 = reader.result.split(',')[1];
                const path = type === 'logo' ? 'Template/static/WebLogo.png' : `manual_uploads/${file.name}`;
                const message = `Uploaded ${type} via Dev Portal`;

                // COMMUNICATE WITH WIX BACKEND
                window.parent.postMessage({
                    type: "GITHUB_UPLOAD",
                    filePath: path,
                    fileContent: base64,
                    commitMsg: message,
                    isAsset: type === 'asset'
                }, "*");

                status.innerText = "Sent to GitHub! Changes will appear in a few minutes.";
            };
            reader.readAsDataURL(file);
        }

        // Load Initial Data
        async function init() {
            const res = await fetch('https://raw.githubusercontent.com/caseythefluff/TSAssetArchive/main/asset_hashes.json');
            const urls = await res.json();
            const grid = document.getElementById('asset-grid');
            urls.reverse().forEach(url => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<img src="${url}" class="card-media"><div class="card-body"><span>Asset</span><a href="${url}" style="color:var(--accent-teal); text-decoration:none;">GET</a></div>`;
                grid.appendChild(div);
            });
        }
        init();
    </script>
</body>
</html>
